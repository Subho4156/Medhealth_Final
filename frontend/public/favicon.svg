<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <!-- Rounded green square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="3" y="3" width="58" height="58" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Medical cross (vertical) -->
  <rect x="24" y="12" width="16" height="40" rx="4" fill="url(#cross)"/>
  <!-- Medical cross (horizontal) -->
  <rect x="12" y="24" width="40" height="16" rx="4" fill="url(#cross)"/>
</svg>